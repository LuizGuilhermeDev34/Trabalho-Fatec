<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CastraPet - Cadastro</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="auth-box">
    <h1>🐾 CastraPet</h1>
    <p>Crie sua conta de tutor</p>

    <div id="alerta"></div>

    <form id="formCadastro">
        <div class="form-group">
            <label>Nome completo</label>
            <input type="text" id="nome" placeholder="Seu nome" required>
        </div>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
        </div>
        <div class="form-group">
            <label>Telefone</label>
            <input type="tel" id="telefone" placeholder="(11) 99999-9999">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Criar conta</button>
    </form>

    <div class="auth-link">
        Já tem conta? <a href="/">Entrar</a>
    </div>
</div>

<script>
    document.getElementById('formCadastro').addEventListener('submit', async (e) => {
        e.preventDefault();
        const alertaEl = document.getElementById('alerta');
        alertaEl.innerHTML = '';

        try {
            const resp = await fetch('/api/auth/registrar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome: document.getElementById('nome').value,
                    email: document.getElementById('email').value,
                    telefone: document.getElementById('telefone').value,
                    senha: document.getElementById('senha').value
                })
            });
            const dados = await resp.json();
            if (!resp.ok) throw new Error(dados.erro || 'Erro ao cadastrar');

            localStorage.setItem('token', dados.token);
            localStorage.setItem('usuario', JSON.stringify({ id: dados.id, nome: dados.nome, role: dados.role, email: dados.email }));
            location.href = '/dashboard.html';
        } catch (err) {
            alertaEl.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
        }
    });
</script>
</body>
</html>
